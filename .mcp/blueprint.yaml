name: mcp-builder-org-blueprint
# Blueprint de ambiente ORGANIZAÇÃO para o monorepo mcp-builder.
# Adapta a metodologia declarativa estilo Devin, sem usar Devin.
# Este blueprint descreve COMO configurar o ambiente de dev do PRÓPRIO builder.

scope: organization

# ============================================================================
# initialize — ferramentas globais que todos os workspaces do monorepo usam
# ============================================================================
initialize:
  - name: Install Node.js 20
    uses: github.com/actions/setup-node@v4
    with:
      node-version: "20"
      cache: "npm"
      cache-dependency-path: builder/package.json

  - name: Install Python 3.12
    uses: github.com/actions/setup-python@v5
    with:
      python-version: "3.12"
      cache: "pip"

  - name: Install Go 1.22
    uses: github.com/actions/setup-go@v5
    with:
      go-version: "1.22"

  - name: Install Rust (stable)
    run: |
      curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
      source $HOME/.cargo/env
      rustup component add clippy rustfmt

  - name: Install shared tools
    run: |
      npm install -g pnpm turbo
      pip install uv ruff mypy pytest hypothesis mutmut

# ============================================================================
# maintenance — instalado após clone (em cada workspace específico via subshell)
# ============================================================================
maintenance:
  - name: Install builder deps
    run: |
      cd builder
      npm install

  - name: Build builder
    run: |
      cd builder
      npm run build

  - name: Install echo-stateless (example)
    run: |
      cd examples/echo-stateless
      pip install -e ".[dev]"

# ============================================================================
# knowledge — referência surfaced ao agente
# ============================================================================
knowledge:
  - name: lint
    contents: |
      Builder (TS):
      cd builder && npm run lint

      Templates (Python):
      ruff check examples/echo-stateless/src

  - name: typecheck
    contents: |
      Builder:
      cd builder && npm run typecheck

  - name: test
    contents: |
      Builder unit + property + contract tests:
      cd builder && npm test

      Echo-stateless example:
      cd examples/echo-stateless && pytest -v --cov=echo_stateless

  - name: build
    contents: |
      Builder:
      cd builder && npm run build

      Output: builder/dist/

  - name: generate
    contents: |
      Generate a new MCP server via CLI:
      cd builder && node dist/cli/index.js new my-mcp --sdk python --pattern stateless --tools echo

      Show FSM:
      cd builder && node dist/cli/index.js fsm-show

      Validate spec:
      cd builder && node dist/cli/index.js validate path/to/spec.json

  - name: mutation
    contents: |
      Run mutation testing on builder:
      cd builder && npx stryker run

      Threshold: 70% (release gate)

  - name: serve
    contents: |
      Start Builder as MCP server (for Claude Code / Cursor):
      cd builder && node dist/cli/index.js serve

      Start Builder as HTTP API:
      cd builder && node dist/cli/index.js serve:http --port 3000

# ============================================================================
# post-build — validação cross-repo após setup completo (org/enterprise only)
# ============================================================================
post-build:
  - name: Verify toolchain
    run: |
      node --version
      python --version
      go version
      cargo --version

  - name: Verify builder builds
    run: |
      cd builder
      npm run build
      test -f dist/cli/index.js

  - name: Verify example tests pass
    run: |
      cd examples/echo-stateless
      pytest -v --cov-fail-under=80

# ============================================================================
# env — variáveis globais do monorepo
# ============================================================================
env:
  NODE_ENV: development
  PYTHONUNBUFFERED: "1"
  MCP_BUILDER_VERSION: "1.0.0"

# ============================================================================
# secrets — esperados via GitHub Actions secrets
# ============================================================================
secrets:
  - NPM_TOKEN          # publicar @mcp-builder/cli no npm
  - PYPI_TOKEN         # publicar templates Python no PyPI
  - GITHUB_TOKEN       # default do Actions
