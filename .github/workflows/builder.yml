# Builder CI — validates the MCP Builder itself on every commit/PR
#
# This workflow is CRITICAL: it validates the builder codebase, NOT generated MCPs.
# Other workflows (scaffold.yml, test.yml) test GENERATED projects.
# This workflow ensures the builder doesn't regress.

name: Builder CI

on:
  push:
    branches: [main, dev/**]
  pull_request:
    branches: [main, dev/**]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: builder-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================================================
  # Matrix build — test across Node versions
  # ==========================================================================
  build:
    name: Build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: builder/package-lock.json

      - name: Install dependencies
        working-directory: builder
        run: npm ci

      - name: Type check
        working-directory: builder
        run: npm run typecheck

      - name: Build
        working-directory: builder
        run: npm run build

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: builder-dist-node-${{ matrix.node }}
          path: builder/dist
          retention-days: 7

  # ==========================================================================
  # Test all layers
  # ==========================================================================
  test:
    name: Test ${{ matrix.suite }}
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        suite: [unit, contract, property]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: builder/package-lock.json

      - name: Install dependencies
        working-directory: builder
        run: npm ci

      - name: Build
        working-directory: builder
        run: npm run build

      - name: Run ${{ matrix.suite }} tests
        working-directory: builder
        run: npm test -- --run ${{ matrix.suite == 'unit' && 'tests/*.test.ts' || matrix.suite == 'contract' && 'tests/contract.test.ts' || 'tests/property.test.ts' }}

      - name: Upload coverage
        if: matrix.suite == 'unit'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.suite }}
          path: builder/coverage
          if-no-files-found: ignore

  # ==========================================================================
  # Lint and code quality
  # ==========================================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: builder/package-lock.json

      - name: Install dependencies
        working-directory: builder
        run: npm ci

      - name: Run ESLint
        working-directory: builder
        run: npm run lint
        continue-on-error: true

  # ==========================================================================
  # Mutation testing (weekly or on main)
  # ==========================================================================
  mutation:
    name: Mutation Test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    needs: [build, test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: builder/package-lock.json

      - name: Install dependencies
        working-directory: builder
        run: npm ci

      - name: Build
        working-directory: builder
        run: npm run build

      - name: Run mutation tests
        working-directory: builder
        run: npm run test:mutation
        continue-on-error: true

      - name: Upload mutation report
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: builder/reports/mutation
          if-no-files-found: ignore

  # ==========================================================================
  # Summary status check
  # ==========================================================================
  status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [build, test, lint]
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.build.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ]; then
            echo "::error::Builder CI failed"
            exit 1
          fi
          echo "::notice::Builder CI passed all gates"
