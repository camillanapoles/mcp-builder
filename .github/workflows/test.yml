# Test workflow — materializa transição scaffolded → tested
#
# Recebe artifact do scaffold, roda testes unit + contract + property,
# faz upload do coverage como artifact, dispara e2e.yml se passar.

name: Test

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: "Nome do projeto a testar"
        required: true
        type: string
      scaffold_run_id:
        description: "Run ID do scaffold que gerou o projeto"
        required: true
        type: string
  workflow_run:
    workflows: ["Scaffold"]
    types: [completed]
    branches: ["scaffold/*"]

permissions:
  contents: read
  actions: read

concurrency:
  group: test-${{ github.event.inputs.project_name || github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        suite: [unit, contract, property]
    steps:
      - uses: actions/checkout@v4

      - name: Download scaffold artifact
        uses: actions/download-artifact@v4
        with:
          name: scaffold-${{ inputs.project_name || 'example-mcp' }}
          path: ./project
          run-id: ${{ inputs.scaffold_run_id || github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect SDK
        id: detect
        run: |
          if [ -f "project/pyproject.toml" ]; then
            echo "sdk=python" >> $GITHUB_OUTPUT
          elif [ -f "project/package.json" ]; then
            echo "sdk=typescript" >> $GITHUB_OUTPUT
          elif [ -f "project/go.mod" ]; then
            echo "sdk=go" >> $GITHUB_OUTPUT
          elif [ -f "project/Cargo.toml" ]; then
            echo "sdk=rust" >> $GITHUB_OUTPUT
          else
            echo "::error::unknown SDK"
            exit 1
          fi

      # ==========================================================================
      # Python
      # ==========================================================================
      - name: Setup Python
        if: steps.detect.outputs.sdk == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python deps
        if: steps.detect.outputs.sdk == 'python'
        working-directory: project
        run: pip install -e ".[dev]"

      - name: Run unit tests (Python)
        if: steps.detect.outputs.sdk == 'python' && matrix.suite == 'unit'
        working-directory: project
        run: pytest tests/ -v --cov --cov-report=xml --cov-fail-under=80

      - name: Run contract tests (Python)
        if: steps.detect.outputs.sdk == 'python' && matrix.suite == 'contract'
        working-directory: project
        run: pytest tests/test_contract.py -v

      - name: Run property tests (Python)
        if: steps.detect.outputs.sdk == 'python' && matrix.suite == 'property'
        working-directory: project
        run: pytest tests/test_property.py -v

      # ==========================================================================
      # TypeScript
      # ==========================================================================
      - name: Setup Node
        if: steps.detect.outputs.sdk == 'typescript'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: project/package.json

      - name: Install Node deps
        if: steps.detect.outputs.sdk == 'typescript'
        working-directory: project
        run: npm install

      - name: Run unit tests (TypeScript)
        if: steps.detect.outputs.sdk == 'typescript' && matrix.suite == 'unit'
        working-directory: project
        run: npm run test -- tests/unit.test.ts

      - name: Run property tests (TypeScript)
        if: steps.detect.outputs.sdk == 'typescript' && matrix.suite == 'property'
        working-directory: project
        run: npm run test:property

      # ==========================================================================
      # Go
      # ==========================================================================
      - name: Setup Go
        if: steps.detect.outputs.sdk == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run Go tests
        if: steps.detect.outputs.sdk == 'go' && matrix.suite == 'unit'
        working-directory: project
        run: go test ./... -v -coverprofile=coverage.out

      # ==========================================================================
      # Rust
      # ==========================================================================
      - name: Setup Rust
        if: steps.detect.outputs.sdk == 'rust'
        uses: dtolnay/rust-toolchain@stable

      - name: Run Rust tests
        if: steps.detect.outputs.sdk == 'rust' && matrix.suite == 'unit'
        working-directory: project
        run: cargo test --verbose

      # ==========================================================================
      # Common: upload coverage
      # ==========================================================================
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-${{ matrix.suite }}-${{ inputs.project_name || 'example' }}
          path: |
            project/coverage.xml
            project/coverage.out
            project/target/coverage
          if-no-files-found: ignore
          retention-days: 14

  all-suites-passed:
    needs: test
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Trigger e2e workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'e2e.yml',
              ref: context.ref,
              inputs: {
                project_name: '${{ inputs.project_name || 'example-mcp' }}',
                test_run_id: '${{ github.run_id }}'
              }
            });

  on-failure:
    needs: test
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'advisor-block.yml',
              ref: context.ref,
              inputs: {
                failed_workflow: 'test',
                run_id: '${{ github.run_id }}',
                reason: 'tests.failed'
              }
            });
