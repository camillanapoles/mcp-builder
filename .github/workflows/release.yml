# Release workflow — materializa transição validated → released
#
# Gate final: roda mutation testing. Se score < 70%, advisor bloqueia.
# Se passar: cria tag, release, publica artifact como release asset.

name: Release

on:
  workflow_dispatch:
    inputs:
      project_name:
        required: true
        type: string
      e2e_run_id:
        required: true
        type: string
      determinism_hash:
        required: true
        type: string
  workflow_run:
    workflows: ["E2E"]
    types: [completed]

permissions:
  contents: write
  actions: read

jobs:
  mutation-gate:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      mutation_score: ${{ steps.mutation.outputs.score }}
      approved: ${{ steps.advisor.outputs.approved }}
    steps:
      - uses: actions/checkout@v4

      - name: Download project
        uses: actions/download-artifact@v4
        with:
          name: scaffold-${{ inputs.project_name || 'example-mcp' }}
          path: ./project
          run-id: ${{ inputs.e2e_run_id || github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect SDK
        id: detect
        run: |
          if [ -f "project/pyproject.toml" ]; then echo "sdk=python" >> $GITHUB_OUTPUT
          elif [ -f "project/package.json" ]; then echo "sdk=typescript" >> $GITHUB_OUTPUT
          elif [ -f "project/go.mod" ]; then echo "sdk=go" >> $GITHUB_OUTPUT
          elif [ -f "project/Cargo.toml" ]; then echo "sdk=rust" >> $GITHUB_OUTPUT
          else echo "::error::unknown SDK"; exit 1; fi

      # ==========================================================================
      # Mutation testing (Python)
      # ==========================================================================
      - name: Setup Python
        if: steps.detect.outputs.sdk == 'python'
        uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - name: Run mutation tests (Python)
        id: mutation
        if: steps.detect.outputs.sdk == 'python'
        working-directory: project
        run: |
          pip install -e ".[dev]"
          mutmut run --use-coverage || true
          # Parse mutmut results for score
          RESULTS=$(mutmut results 2>&1 || echo "")
          echo "$RESULTS"
          # Rough score: (killed + timeout) / total
          TOTAL=$(echo "$RESULTS" | grep -cE '^[0-9]+' || echo 1)
          KILLED=$(echo "$RESULTS" | grep -cE 'survived' || echo 0)
          if [ "$TOTAL" -gt 0 ]; then
            SCORE=$(python -c "print(max(0, 1 - $KILLED / $TOTAL))")
          else
            SCORE=1.0
          fi
          echo "score=$SCORE" >> $GITHUB_OUTPUT
          echo "Mutation score: $SCORE"

      - name: Run mutation tests (TypeScript)
        id: mutation-ts
        if: steps.detect.outputs.sdk == 'typescript'
        working-directory: project
        run: |
          npm install
          npx stryker run || true
          # Parse stryker report for score
          SCORE=$(grep -oE '"mutationScore": [0-9.]+' reports/mutation/mutation.json | head -1 | awk '{print $2}' || echo 0)
          echo "score=$SCORE" >> $GITHUB_OUTPUT

      # ==========================================================================
      # Advisor final sign-off
      # ==========================================================================
      - name: Advisor sign-off
        id: advisor
        run: |
          SCORE="${{ steps.mutation.outputs.score || steps.mutation-ts.outputs.score || '0' }}"
          THRESHOLD=0.70
          APPROVED=$(python -c "print('true' if float('$SCORE') >= $THRESHOLD else 'false')")
          echo "approved=$APPROVED" >> $GITHUB_OUTPUT
          if [ "$APPROVED" != "true" ]; then
            echo "::error::mutation score $SCORE < $THRESHOLD — release blocked by advisor"
            exit 1
          fi
          echo "✓ Advisor approved release (mutation score: $SCORE)"

  release:
    needs: mutation-gate
    if: needs.mutation-gate.outputs.approved == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Download project
        uses: actions/download-artifact@v4
        with:
          name: scaffold-${{ inputs.project_name || 'example-mcp' }}
          path: ./project

      - name: Compute version
        id: version
        run: |
          # Use date-based versioning for example releases
          VERSION="v$(date +%Y.%m.%d-%H%M%S)"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=${{ inputs.project_name || 'example-mcp' }}-$VERSION" >> $GITHUB_OUTPUT

      - name: Create git tag
        run: |
          git config user.name "mcp-builder-bot"
          git config user.email "bot@mcp-builder.dev"
          git add -A
          git commit -m "release: ${{ inputs.project_name || 'example-mcp' }} ${{ steps.version.outputs.version }}" || true
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ inputs.project_name || 'example-mcp' }} ${{ steps.version.outputs.version }}
          body: |
            ## Release ${{ steps.version.outputs.version }}

            **Project**: ${{ inputs.project_name || 'example-mcp' }}
            **Determinism hash**: ${{ inputs.determinism_hash }}
            **Mutation score**: ${{ needs.mutation-gate.outputs.mutation_score }}

            ### FSM transitions
            draft → scaffolded → tested → validated → **released** ✅
          files: |
            project/**
            project/.mcp/state/*.yaml
          generate_release_notes: true

      - name: Notify stakeholders (monitor hook)
        run: |
          echo "::notice::Release ${{ steps.version.outputs.tag }} published"

  on-failure:
    needs: mutation-gate
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'advisor-block.yml',
              ref: context.ref,
              inputs: {
                failed_workflow: 'release',
                run_id: '${{ github.run_id }}',
                reason: 'release.failed'
              }
            });
