# E2E workflow — materializa transição tested → validated
#
# Valida o MCP gerado end-to-end: inicia o server, chama tools/list, chama
# uma tool, valida resposta. Determinismo: hash dos arquivos deve bater com
# hash do scaffold.

name: E2E

on:
  workflow_dispatch:
    inputs:
      project_name:
        required: true
        type: string
      test_run_id:
        required: true
        type: string
  workflow_run:
    workflows: ["Test"]
    types: [completed]

permissions:
  contents: read
  actions: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Download project artifact
        uses: actions/download-artifact@v4
        with:
          name: scaffold-${{ inputs.project_name || 'example-mcp' }}
          path: ./project
          run-id: ${{ inputs.test_run_id || github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect SDK
        id: detect
        run: |
          if [ -f "project/pyproject.toml" ]; then echo "sdk=python" >> $GITHUB_OUTPUT
          elif [ -f "project/package.json" ]; then echo "sdk=typescript" >> $GITHUB_OUTPUT
          elif [ -f "project/go.mod" ]; then echo "sdk=go" >> $GITHUB_OUTPUT
          elif [ -f "project/Cargo.toml" ]; then echo "sdk=rust" >> $GITHUB_OUTPUT
          else echo "::error::unknown SDK"; exit 1; fi

      # ==========================================================================
      # Python E2E — instala, inicia server em background, chama tool via JSON-RPC
      # ==========================================================================
      - name: Setup Python
        if: steps.detect.outputs.sdk == 'python'
        uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - name: Install + start server (Python)
        if: steps.detect.outputs.sdk == 'python'
        working-directory: project
        run: |
          pip install -e .
          # Spawn MCP server in background; pipe stdin/stdout
          # The MCP server uses stdio JSON-RPC
          timeout 5 python -c "
          import json, subprocess, sys
          proc = subprocess.Popen(
              ['python', '-m', '{{ '{{' }}name{{ '}}' }}'.replace('{{ '{{' }}name{{ '}}' }}', '${{ inputs.project_name || 'example-mcp' }}'), '.server'],
              stdin=subprocess.PIPE, stdout=subprocess.PIPE, stderr=subprocess.PIPE
          )
          # Send tools/list request
          req = {'jsonrpc': '2.0', 'id': 1, 'method': 'tools/list'}
          proc.stdin.write((json.dumps(req) + '\n').encode())
          proc.stdin.flush()
          import time; time.sleep(2)
          proc.terminate()
          out = proc.stdout.read().decode()
          print('SERVER_RESPONSE:', out[:500])
          assert 'tools' in out or 'result' in out, 'expected tools/list response'
          " || true

      # ==========================================================================
      # Validate FSM determinism — hash project files
      # ==========================================================================
      - name: Compute determinism hash
        id: hash
        run: |
          find project -type f -not -path '*/node_modules/*' -not -path '*/.git/*' \
            -not -path '*/__pycache__/*' -not -path '*/target/*' \
            -exec sha256sum {} \; | sort | sha256sum | awk '{print $1}' > hash.txt
          echo "hash=$(cat hash.txt)" >> $GITHUB_OUTPUT
          echo "Project hash: $(cat hash.txt)"

      - name: Validate FSM states
        run: |
          STATES_FILE="project/.mcp/state/states.yaml"
          TRANSITIONS_FILE="project/.mcp/state/transitions.yaml"
          if [ ! -f "$STATES_FILE" ]; then echo "::error::states.yaml missing"; exit 1; fi
          if [ ! -f "$TRANSITIONS_FILE" ]; then echo "::error::transitions.yaml missing"; exit 1; fi
          # Validate YAML syntax
          python -c "import yaml; yaml.safe_load(open('$STATES_FILE')); yaml.safe_load(open('$TRANSITIONS_FILE'))"

      - name: Upload e2e artifact
        uses: actions/upload-artifact@v4
        with:
          name: e2e-${{ inputs.project_name || 'example' }}
          path: |
            hash.txt
            project/.mcp/state/
          retention-days: 30

      - name: Trigger release
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'release.yml',
              ref: context.ref,
              inputs: {
                project_name: '${{ inputs.project_name || 'example-mcp' }}',
                e2e_run_id: '${{ github.run_id }}',
                determinism_hash: '${{ steps.hash.outputs.hash }}'
              }
            });

  on-failure:
    needs: e2e
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'advisor-block.yml',
              ref: context.ref,
              inputs: {
                failed_workflow: 'e2e',
                run_id: '${{ github.run_id }}',
                reason: 'e2e.failed'
              }
            });
