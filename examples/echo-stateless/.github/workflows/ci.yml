# CI for echo-stateless — validates the example end-to-end
name: CI

on:
  push:
    branches: [main]
    paths: ["examples/echo-stateless/**"]
  pull_request:
    paths: ["examples/echo-stateless/**"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        working-directory: examples/echo-stateless
        run: pip install -e ".[dev]"
      - name: Unit tests
        working-directory: examples/echo-stateless
        run: pytest tests/test_tools.py -v --cov=echo_stateless --cov-fail-under=80
      - name: Property tests
        working-directory: examples/echo-stateless
        run: pytest tests/test_property.py -v
      - name: Contract tests
        working-directory: examples/echo-stateless
        run: pytest tests/test_contract.py -v
      - name: Server smoke test
        working-directory: examples/echo-stateless
        run: |
          # Spawn server, send tools/list, validate response
          python -c "
          import json, subprocess, sys, time
          proc = subprocess.Popen(
              ['python', '-m', 'echo_stateless.server'],
              stdin=subprocess.PIPE, stdout=subprocess.PIPE, stderr=subprocess.PIPE
          )
          req = {'jsonrpc': '2.0', 'id': 1, 'method': 'tools/list'}
          proc.stdin.write((json.dumps(req) + '\n').encode())
          proc.stdin.flush()
          time.sleep(2)
          proc.terminate()
          out = proc.stdout.read().decode()
          assert 'echo' in out or 'ping' in out or 'result' in out, f'unexpected: {out[:500]}'
          print('✓ MCP server responded to tools/list')
          "
