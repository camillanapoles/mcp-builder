[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "echo-stateless"
version = "0.1.0"
description = "Example MCP server generated by mcp-builder (stateless pattern)"
requires-python = ">=3.10"
dependencies = ["mcp[cli]>=1.0.0", "pydantic>=2.0.0"]

[project.optional-dependencies]
dev = ["pytest>=8.0.0", "pytest-cov>=5.0.0", "hypothesis>=6.100.0", "mutmut>=3.0.0", "ruff>=0.5.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/echo_stateless"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --cov=echo_stateless --cov-fail-under=80"
