transitions:
  - from: idle
    to: event_received
    event: event.published
    action_workflow: ci.yml
  - from: event_received
    to: projected
    event: handlers.executed
    action_workflow: ci.yml
  - from: projected
    to: idle
    event: projection.committed
    action_workflow: ci.yml
  - from: "*"
    to: failed
    event: "*.failed"
    action_workflow: ci.yml
